# ╔══════════════════════════════════════╗
# ║         kitty.conf — blanco          ║
# ║     Claude-inspired theme            ║
# ╚══════════════════════════════════════╝
#
# ── Fonts ────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# ── Window / Transparency ────────────────────────────────────────────────────
background_opacity 0.80
dynamic_background_opacity yes

window_padding_width 12
hide_window_decorations no
remember_window_size   yes
initial_window_width   220c
initial_window_height  50c

# ── Cursor ───────────────────────────────────────────────────────────────────
cursor                  #DA7756
cursor_text_color       #1C1917
cursor_shape            block
cursor_blink_interval   0

# ── Claude-inspired Color Palette ────────────────────────────────────────────
# Warm dark backgrounds, orange accents, cool grey text

background            #1C1917
foreground            #E8E3DC

selection_background  #DA7756
selection_foreground  #1C1917

# Black
color0  #2C2825
color8  #4A4540

# Red
color1  #C0473A
color9  #D45A4C

# Green
color2  #6A8F6A
color10 #80A880

# Yellow / Orange — Claude's signature
color3  #C4823A
color11 #DA7756

# Blue
color4  #5A7FA8
color12 #7098C0

# Magenta
color5  #8F6A8A
color13 #A87EA5

# Cyan
color6  #5A8F8A
color14 #70A8A4

# White
color7  #C8C0B8
color15 #E8E3DC

# ── Tab Bar ──────────────────────────────────────────────────────────────────
tab_bar_style            powerline
tab_powerline_style      slanted
tab_bar_min_tabs         1
tab_bar_edge             bottom
tab_bar_align            left

tab_title_template            " {index}: {title} "
active_tab_title_template     " {index}: {title} "

active_tab_foreground    #1C1917
active_tab_background    #DA7756
active_tab_font_style    bold

inactive_tab_foreground  #8A8278
inactive_tab_background  #2C2825
inactive_tab_font_style  normal

tab_bar_background       #161210

# ── Splits / Layouts ─────────────────────────────────────────────────────────
enabled_layouts tall,stack,fat,grid,horizontal,vertical

# Window border colors (active pane highlight)
active_border_color   #DA7756
inactive_border_color #2C2825
bell_border_color     #C4823A

draw_minimal_borders yes

# ── Key Bindings ─────────────────────────────────────────────────────────────

# Tabs
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+alt+t    set_tab_title
map ctrl+shift+1        goto_tab 1
map ctrl+shift+2        goto_tab 2
map ctrl+shift+3        goto_tab 3
map ctrl+shift+4        goto_tab 4
map ctrl+shift+5        goto_tab 5

# Splits
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window
map ctrl+shift+f5       load_config_file

# Opacity nudge
map ctrl+shift+a>m      set_background_opacity +0.05
map ctrl+shift+a>l      set_background_opacity -0.05
map ctrl+shift+a>1      set_background_opacity 1.0

# Font size
map ctrl+equal          change_font_size all +1.0
map ctrl+minus          change_font_size all -1.0
map ctrl+0              change_font_size all 0

## Disable scrolling
map alt+up no_op
map alt+down no_op

# Other
map ctrl+backspace send_text all \x17

# ── Misc ─────────────────────────────────────────────────────────────────────
scrollback_lines        10000
copy_on_select          yes
strip_trailing_spaces   smart
enable_audio_bell       no
visual_bell_duration    0.1
# shell                   bash
editor                  nvim
close_on_child_death    yes
